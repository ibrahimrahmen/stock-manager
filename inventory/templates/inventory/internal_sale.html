{% load inventory_tags %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vente interne — Stock Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: #0f0f0d;
      color: #f0ede6;
      min-height: 100vh;
      padding: 20px;
    }
    .topbar {
      max-width: 720px;
      margin: 0 auto 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar a { color: #8a887f; text-decoration: none; font-size: 14px; }
    .topbar a:hover { color: #f0ede6; }
    .is-page { max-width: 720px; margin: 0 auto; }
    .is-card {
      background: #1a1a17;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 22px;
      margin-bottom: 18px;
    }
    .is-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .is-row:last-child { border-bottom: none; }
    .is-row label { color: #8a887f; font-size: 14px; }
    .is-row .val { font-weight: 600; color: #f0ede6; }
    .is-input {
      width: 100%;
      padding: 12px 14px;
      background: #222220;
      color: #f0ede6;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
    }
    .is-input:focus { outline: 2px solid #4ade9a; outline-offset: -1px; }
    .is-btn {
      padding: 13px 24px;
      background: #4ade9a;
      color: #0f0f0d;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-family: inherit;
    }
    .is-btn:disabled { opacity: .5; cursor: not-allowed; }
    .is-btn-secondary { background: #2f2f2c; color: #f0ede6; }
    .is-msg { padding: 12px; border-radius: 8px; margin: 12px 0; font-size: 14px; }
    .is-msg-ok { background: rgba(74,222,154,0.12); color: #4ade9a; }
    .is-msg-err { background: rgba(248,113,113,0.12); color: #f87171; }
    .is-hidden { display: none; }
    .is-title {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      margin-bottom: 6px;
    }
    .is-help { color: #8a887f; font-size: 14px; margin-bottom: 18px; }
    .is-label { display: block; font-size: 13px; color: #8a887f; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="{% url 'dashboard' %}">← Dashboard</a>
    <span style="color:#8a887f;font-size:13px;">Admin</span>
  </div>

  <div class="is-page">
    <div class="is-title">🛒 Vente interne</div>
    <div class="is-help">Scannez le code-barres d'une unité pour vendre à un employé / ami. Prix par défaut = prix d'achat.</div>

    <div class="is-card">
      <label for="barcode-input" class="is-label">CODE-BARRES UNITÉ</label>
      <input id="barcode-input" class="is-input" placeholder="Scannez ou tapez le code..." autofocus />
      <div id="lookup-msg" class="is-msg is-hidden"></div>
    </div>

    <div id="confirm-card" class="is-card is-hidden">
      <div class="is-row"><label>Produit</label><span class="val" id="info-product">—</span></div>
      <div class="is-row"><label>Couleur</label><span class="val" id="info-color">—</span></div>
      <div class="is-row"><label>Taille</label><span class="val" id="info-size">—</span></div>
      <div class="is-row"><label>Statut actuel</label><span class="val" id="info-status">—</span></div>
      <div class="is-row"><label>Prix d'achat</label><span class="val" id="info-buy">—</span></div>
      <div class="is-row"><label>Prix de vente normal</label><span class="val" id="info-sell">—</span></div>

      <div style="margin-top: 18px;">
        <label for="price-input" class="is-label">PRIX DE VENTE (DT)</label>
        <input id="price-input" class="is-input" type="number" step="0.001" />
      </div>

      <div style="margin-top: 14px;">
        <label for="note-input" class="is-label">NOTE (optionnel)</label>
        <input id="note-input" class="is-input" placeholder="ex: vendu à Ahmed (employé)" />
      </div>

      <div id="confirm-msg" class="is-msg is-hidden"></div>

      <div style="display: flex; gap: 10px; margin-top: 18px;">
        <button id="cancel-btn" class="is-btn is-btn-secondary" onclick="cancelSale()">Annuler</button>
        <button id="confirm-btn" class="is-btn" onclick="confirmSale()">Valider la vente</button>
      </div>
    </div>
  </div>

<script>
  function getCsrf() {
    var m = document.cookie.match(/csrftoken=([^;]+)/);
    return m ? m[1] : '';
  }

  var currentBarcode = '';

  function showMsg(elId, kind, text) {
    var el = document.getElementById(elId);
    el.className = 'is-msg ' + (kind === 'ok' ? 'is-msg-ok' : 'is-msg-err');
    el.textContent = text;
    el.classList.remove('is-hidden');
  }
  function hideMsg(elId) {
    document.getElementById(elId).classList.add('is-hidden');
  }

  async function lookupBarcode() {
    var barcode = document.getElementById('barcode-input').value.trim().toUpperCase();
    if (!barcode) return;
    hideMsg('lookup-msg');
    try {
      var res = await fetch("{% url 'api_internal_sale_lookup' %}", {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
        body: JSON.stringify({ barcode: barcode }),
      });
      var data = await res.json();
      if (data.status !== 'ok') {
        showMsg('lookup-msg', 'err', data.message || 'Erreur');
        document.getElementById('confirm-card').classList.add('is-hidden');
        return;
      }
      currentBarcode = data.unit.barcode;
      document.getElementById('info-product').textContent = data.unit.product_name;
      document.getElementById('info-color').textContent = data.unit.color_label || '—';
      document.getElementById('info-size').textContent = data.unit.size || '—';
      document.getElementById('info-status').textContent = data.unit.status_raw;
      document.getElementById('info-buy').textContent = data.unit.buy_price + ' DT';
      document.getElementById('info-sell').textContent = data.unit.sell_price + ' DT';
      document.getElementById('price-input').value = data.unit.buy_price;
      document.getElementById('note-input').value = '';
      hideMsg('confirm-msg');
      document.getElementById('confirm-card').classList.remove('is-hidden');
      document.getElementById('price-input').focus();
      document.getElementById('price-input').select();
    } catch(e) {
      showMsg('lookup-msg', 'err', 'Erreur réseau : ' + e.message);
    }
  }

  async function confirmSale() {
    var price = document.getElementById('price-input').value.trim();
    var note = document.getElementById('note-input').value.trim();
    if (!price || isNaN(parseFloat(price))) {
      showMsg('confirm-msg', 'err', 'Prix invalide.');
      return;
    }
    if (!confirm('Confirmer la vente de ' + currentBarcode + ' à ' + price + ' DT ?')) return;

    document.getElementById('confirm-btn').disabled = true;
    try {
      var res = await fetch("{% url 'api_internal_sale_confirm' %}", {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
        body: JSON.stringify({ barcode: currentBarcode, sale_price: price, note: note }),
      });
      var data = await res.json();
      if (data.status !== 'ok') {
        showMsg('confirm-msg', 'err', data.message || 'Erreur');
        return;
      }
      showMsg('lookup-msg', 'ok', '✓ ' + data.message);
      document.getElementById('confirm-card').classList.add('is-hidden');
      document.getElementById('barcode-input').value = '';
      document.getElementById('barcode-input').focus();
      currentBarcode = '';
    } catch(e) {
      showMsg('confirm-msg', 'err', 'Erreur réseau : ' + e.message);
    } finally {
      document.getElementById('confirm-btn').disabled = false;
    }
  }

  function cancelSale() {
    document.getElementById('confirm-card').classList.add('is-hidden');
    document.getElementById('barcode-input').value = '';
    document.getElementById('barcode-input').focus();
    currentBarcode = '';
    hideMsg('lookup-msg');
  }

  document.getElementById('barcode-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      lookupBarcode();
    }
  });
</script>
</body>
</html>

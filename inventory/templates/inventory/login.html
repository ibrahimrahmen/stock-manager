<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Stock Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0e0e0c;--surface:#161614;--border:rgba(255,255,255,0.06);
      --text:#f0ede6;--muted:#7a7870;--hint:#3a3a36;
      --green:#3dba8a;--green-dim:rgba(61,186,138,0.1);
      --red:#e05050;--red-dim:rgba(224,80,80,0.1);
    }
    body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}

    .card{background:var(--surface);border:0.5px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:400px;}

    .logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px;}
    .logo span{color:var(--green);}
    .subtitle{font-size:13px;color:var(--muted);margin-bottom:36px;}

    label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
    input{width:100%;background:rgba(255,255,255,0.04);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--text);outline:none;transition:border-color .15s;margin-bottom:20px;font-family:'DM Sans',sans-serif;}
    input:focus{border-color:rgba(255,255,255,.15);}
    input::placeholder{color:var(--hint);}

    .btn{width:100%;padding:13px;background:var(--text);color:#0e0e0c;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:.01em;transition:opacity .15s;margin-top:4px;}
    .btn:hover{opacity:.88;}

    .error{background:var(--red-dim);border:0.5px solid rgba(224,80,80,0.2);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--red);margin-bottom:20px;}

    .footer{text-align:center;margin-top:24px;font-size:12px;color:var(--hint);}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">stock<span>.</span>manager</div>
    <div class="subtitle">Connectez-vous pour accéder à votre boutique</div>

    {% if form.errors %}
    <div class="error">Nom d'utilisateur ou mot de passe incorrect.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label>Nom d'utilisateur</label>
      <input type="text" name="username" autofocus autocomplete="username" placeholder="admin">
      <label>Mot de passe</label>
      <input type="password" name="password" autocomplete="current-password" placeholder="••••••••">
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn">Se connecter →</button>
    </form>

    <div class="footer">Stock Manager © 2026</div>
  </div>
</body>
</html>

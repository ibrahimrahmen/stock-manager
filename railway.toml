[deploy]
startCommand = "python manage.py migrate && python manage.py ensure_superuser && python manage.py collectstatic --noinput && gunicorn stock_manager.wsgi --bind 0.0.0.0:$PORT --workers 3 --timeout 90 --graceful-timeout 30 --max-requests 200 --max-requests-jitter 50"

[[crons]]
schedule = "0 10 * * *"
command = "curl https://web-production-1391c5.up.railway.app/cron/morning/"

[[crons]]
schedule = "0 18 * * *"
command = "curl https://web-production-1391c5.up.railway.app/cron/evening/"
